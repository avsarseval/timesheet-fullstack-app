<div class="form-container">
  <h2>Yeni Zaman Girişi</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="date">Tarih</label>
      <input type="date" id="date" name="date" [(ngModel)]="timesheetEntry.date" required>
    </div>
    <div class="form-group">
      <label for="startTime">Başlangıç Saati</label>
      <input type="time" id="startTime" name="startTime" [(ngModel)]="timesheetEntry.startTime" required>
    </div>
    <div class="form-group">
      <label for="endTime">Bitiş Saati</label>
      <input type="time" id="endTime" name="endTime" [(ngModel)]="timesheetEntry.endTime" required>
    </div>
    <div class="form-group">
      <label for="description">Açıklama</label>
      <textarea id="description" name="description" rows="3" [(ngModel)]="timesheetEntry.description" required></textarea>
    </div>
    <button type="submit">Kaydet</button>
  </form>
</div>
