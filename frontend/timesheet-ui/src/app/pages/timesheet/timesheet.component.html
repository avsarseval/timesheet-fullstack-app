<!-- Yeni zaman girişi formu (şimdilik burada, sonra modal yapacağız) -->
<app-timesheet-form></app-timesheet-form>

<hr>

<h2>Zaman Çizelgelerim</h2>

<!-- Veri yükleniyorsa bir mesaj gösterebiliriz (opsiyonel) -->

<!-- Eğer hiç veri yoksa, bir uyarı göster -->
<div *ngIf="timesheets.length === 0" class="no-data">
  Henüz bir zaman girişi yapmadınız.
</div>

<!-- Veriler varsa, onları bir tablo içinde listele -->
<table *ngIf="timesheets.length > 0" class="timesheet-table">
  <thead>
  <tr>
    <th>Tarih</th>
    <th>Başlangıç</th>
    <th>Bitiş</th>
    <th>Açıklama</th>
  </tr>
  </thead>
  <tbody>
  <!-- *ngFor ile timesheets dizisindeki her bir eleman için bir satır oluştur -->
  <tr *ngFor="let entry of timesheets">
    <td>{{ entry.date | date: 'dd.MM.yyyy' }}</td>
    <td>{{ entry.startTime }}</td>
    <td>{{ entry.endTime }}</td>
    <td>{{ entry.description }}</td>
  </tr>
  </tbody>
</table>
